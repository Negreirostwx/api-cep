<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Buscador de CEP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Buscador de CEP</h1>

    <input type="text" id="cep" placeholder="Digite o CEP (ex: 01310-100)" maxlength="9" onkeydown="teclaEnter(event)">
    <button onclick="buscarCep()">Buscar</button>

    <div id="resultado"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
